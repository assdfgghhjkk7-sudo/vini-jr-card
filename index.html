<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vini Jr Card - Hussein</title>
    <style>
        body { 
            background-color: #0c121c; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .card { 
            background: linear-gradient(145deg, #ffffff, #e6e6e6); 
            width: 320px; 
            padding: 20px; 
            border-radius: 25px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            border: 4px solid #FEBE10; 
            transition: transform 0.3s;
        }
        .card:hover { transform: scale(1.05); }
        img { 
            width: 100%; 
            border-radius: 15px; 
            border: 2px solid #00529F;
        }
        h1 { color: #00529F; margin: 15px 0 5px 0; font-size: 24px; }
        .club { color: #FEBE10; font-weight: bold; font-size: 1.1em; background: #00529F; display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; }
        .footer { color: #333; font-size: 0.9em; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; }
        .highlight { color: #00529F; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://publish.onefootball.com/wp-content/uploads/sites/10/2023/10/Real-Madrid-CF-v-SSC-Napoli-Group-C-UEFA-Champions-League-1697529432.jpg" alt="Vini Jr">
        <h1>Vinícius Júnior</h1>
        <div class="club">Real Madrid CF ⚪💎</div>
        <div class="footer">
            تمت البرمجة بواسطة <span class="highlight">المبرمج حسين</span>
        </div>
    </div>
</body>
</html>
