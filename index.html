<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vini Jr - Hussein</title>
    <style>
        body { 
            background-color: #050a14; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
        }
        .card { 
            background: white; 
            width: 300px; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            border: 4px solid #FEBE10;
        }
        img { 
            width: 100%; 
            border-radius: 15px; 
        }
        h1 { color: #00529F; font-size: 22px; margin: 15px 0; }
        .tag { 
            background: #00529F; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 50px; 
            display: inline-block;
            font-weight: bold;
        }
        .footer { margin-top: 15px; color: #555; font-size: 14px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://img.olympics.com/images/image/private/t_s_pog_static_content_v3/f_auto/primary/p88w0zls8fcl1hge1v0f" alt="Vini">
        <h1>Vinícius Júnior</h1>
        <div class="tag">Real Madrid ⚪💎</div>
        <div class="footer">برمجة المبرمج حسين البطل</div>
    </div>
</body>
</html>
