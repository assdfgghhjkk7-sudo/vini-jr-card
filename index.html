<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برشلونة البطل - تصميم حسين</title>
    <style>
        body { 
            background-color: #1a1a1a; /* خلفية غامقة حتى تبرز الألوان */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl; /* للكتابة بالعربي */
        }
        .card { 
            background: white; 
            width: 350px; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* إطار بألوان برشلونة */
            border-top: 5px solid #A50044; /* أحمر */
            border-bottom: 5px solid #004D98; /* أزرق */
        }
        img { 
            width: 120px; /* حجم الشعار */
            margin-bottom: 15px;
        }
        h1 { 
            color: #004D98; /* أزرق برشلوني */
            font-size: 26px; 
            margin: 10px 0; 
        }
        .tag { 
            background: #A50044; /* أحمر برشلوني */
            color: white; 
            padding: 8px 20px; 
            border-radius: 50px; 
            display: inline-block;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .trophies {
            text-align: right;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #eee;
        }
        .trophies p {
            margin: 8px 0;
            font-size: 16px;
            color: #333;
        }
        .trophies span {
            font-weight: bold;
            color: #A50044; /* لون العدد */
        }
        .footer { 
            margin-top: 20px; 
            color: #777; 
            font-size: 14px; 
            border-top: 1px solid #eee; 
            padding-top: 10px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/FC_Barcelona_%28crested%29.svg" alt="شعار برشلونة">
        <h1>نادي برشلونة 🔵🔴</h1>
        <div class="tag">Més que un club 🌟</div>
        
        <div class="trophies">
            <p>🏆 دوري أبطال أوروبا: <span>5</span></p>
            <p>🏆 الدوري الإسباني (لا ليغا): <span>27</span></p>
            <p>🏆 كأس ملك إسبانيا: <span>31</span></p>
            <p>🏆 كأس العالم للأندية: <span>3</span></p>
            <p>🏆 كأس السوبر الأوروبي: <span>5</span></p>
            <p>🏆 كأس السوبر الإسباني: <span>14</span></p>
        </div>

        <div class="footer">تصميم المبرمج حسين البطل لأخوه الغالي</div>
    </div>
</body>
</html>
